services:
  journal:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./db:/data/db
    environment:
      - DB_PATH=/data/db/journals.db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis-data:
